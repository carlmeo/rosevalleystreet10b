<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Nya Lägenheten 🏡</title>
<link rel="manifest" href="manifest.json">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.3/Sortable.min.js"></script>
<style>
:root{--ease:cubic-bezier(.4,0,.2,1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}

.app{min-height:100dvh;transition:background .4s var(--ease);padding:0 0 80px}
.app[data-page=buy]{background:#F5EFE0}
.app[data-page=sell]{background:#F5EDE0}
.app[data-page=fix]{background:#EEEDF5}

.app[data-page=buy]{--ac:#4A5A3A;--ac2:#7A8A6A;--ac3:#B5C49A;--ac4:#3A4A2A;--bg:#F5EFE0;--card:#FDFAF2;--card-b:#DDD8C4;--input-bg:#EDE8D8;--pb1-a:#B5C49A;--pb1-b:#D4A855;--pb2-a:#D4A855;--pb2-b:#C47D4A}
.app[data-page=sell]{--ac:#8A5A3A;--ac2:#A0856A;--ac3:#D4A855;--ac4:#5A3A2A;--bg:#F5EDE0;--card:#FDF8F0;--card-b:#D4C4A8;--input-bg:#EDE4D8;--pb1-a:#D4A855;--pb1-b:#C47D4A;--pb2-a:#B5C49A;--pb2-b:#7A8A6A}
.app[data-page=fix]{--ac:#5A5A78;--ac2:#8A88A0;--ac3:#B5B0D4;--ac4:#3A3A5A;--bg:#EEEDF5;--card:#F8F6FC;--card-b:#D0CDE0;--input-bg:#DDDBE6;--pb1-a:#B5B0D4;--pb1-b:#8A8AA0;--pb2-a:#B5B0D4;--pb2-b:#8A8AA0}

.container{max-width:500px;margin:0 auto;padding:12px 14px}

/* Password Screen */
.pw-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#F5EFE0;flex-direction:column;padding:20px}
.pw-box{background:#FDFAF2;border:1px solid #DDD8C4;border-radius:20px;padding:32px 28px;width:100%;max-width:340px;text-align:center}
.pw-box h1{font-size:24px;font-weight:600;color:#3A4A2A;margin-bottom:4px}
.pw-box .sub{font-size:13px;color:#7A8A6A;margin-bottom:20px}
.pw-box input{width:100%;padding:12px 16px;border:1.5px solid #DDD8C4;border-radius:12px;font-size:15px;background:#F5EFE0;color:#3A4A2A;outline:none;transition:border-color .2s}
.pw-box input:focus{border-color:#4A5A3A}
.pw-box button{width:100%;padding:12px;background:#4A5A3A;color:#E8DFC8;border-radius:12px;font-size:15px;font-weight:500;margin-top:12px;transition:transform .1s}
.pw-box button:active{transform:scale(.97)}
.pw-box .err{color:#C47D4A;font-size:12px;margin-top:8px}
.pw-decos{position:absolute;pointer-events:none;font-size:28px;opacity:.3}

/* Header */
.hdr{text-align:center;padding:8px 0 4px}
.hdr h1{font-size:20px;font-weight:600;color:var(--ac4);letter-spacing:-.3px}
.hdr .sub{font-size:11px;color:var(--ac2);margin-top:1px}

/* Tabs */
.tabs{display:flex;border-radius:12px;padding:3px;margin:8px 0;gap:2px;background:var(--input-bg);transition:background .4s var(--ease)}
.tab{flex:1;text-align:center;font-size:11px;font-weight:500;padding:7px 2px;border-radius:9px;cursor:pointer;transition:all .25s var(--ease);color:var(--ac2)}
.tab.active{background:var(--ac);color:#E8DFC8}

/* Search */
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;z-index:1}
.search{width:100%;background:var(--input-bg);border:none;border-radius:10px;padding:8px 12px 8px 32px;font-size:12px;color:var(--ac4);outline:none;transition:background .3s}
.search::placeholder{color:var(--ac2);opacity:.7}

/* Summary */
.summary{background:var(--ac);border-radius:14px;padding:11px 14px;margin-bottom:8px;color:#E8DFC8;position:relative;overflow:hidden;transition:background .4s var(--ease)}
.summary .row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.summary .row span:first-child{opacity:.65}
.summary .row .val{font-weight:500}
.pb{background:rgba(255,255,255,.15);border-radius:5px;height:6px;margin:3px 0 6px;overflow:hidden}
.pb .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--pb1-a),var(--pb1-b));transition:width .5s var(--ease)}
.pb .fill.alt{background:linear-gradient(90deg,var(--pb2-a),var(--pb2-b))}
.summary .deco{position:absolute;opacity:.2;font-size:20px;pointer-events:none}

/* Section Header */
.sec-head{background:var(--ac);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin:3px 0;transition:transform .1s}
.sec-head:active{transform:scale(.98)}
.sec-head .left{display:flex;align-items:center;gap:6px}
.sec-head .title{font-size:14px;font-weight:500;color:#E8DFC8}
.sec-head .badge{font-size:10px;color:var(--ac3);background:rgba(255,255,255,.1);padding:1px 7px;border-radius:6px}
.sec-head .chev{color:var(--ac3);font-size:12px;transition:transform .25s var(--ease)}
.sec-head .chev.collapsed{transform:rotate(-90deg)}
.sec-stats{display:flex;gap:5px;padding:3px 2px;font-size:10px;color:var(--ac2);flex-wrap:wrap}
.sec-stats span{background:var(--input-bg);padding:1px 7px;border-radius:6px}

/* Item Cards */
.item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--card-b);border-radius:10px;padding:5px 8px;margin:3px 0;transition:border-color .15s,opacity .3s,transform .15s}
.item:active{transform:scale(.99)}
.item.done{opacity:.5}
.item.done .item-name{text-decoration:line-through;color:var(--ac2)}
.item .drag{color:var(--card-b);font-size:12px;cursor:grab;line-height:1;touch-action:none;user-select:none;padding:4px 2px}
.item .thumb{width:34px;height:34px;border-radius:7px;background:var(--input-bg);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden;position:relative}
.item .thumb img{width:100%;height:100%;object-fit:cover}
.item .thumb{position:relative}
.item .thumb:hover .thumb-zoom{display:block}
.thumb-zoom{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);width:160px;height:160px;border-radius:12px;overflow:hidden;border:2px solid var(--card-b);background:var(--card);z-index:15;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.thumb-zoom img{width:100%;height:100%;object-fit:cover}
@media(hover:none){.thumb-zoom{display:none!important}}
.sec-edit{font-size:13px;padding:2px 6px;cursor:pointer;opacity:.5;transition:opacity .2s;color:#E8DFC8}
.sec-edit:hover{opacity:1}
.item .info{flex:1;min-width:0}
.item .item-name{font-size:12px;font-weight:500;color:var(--ac4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{font-size:10px;color:var(--ac2);display:flex;gap:6px;flex-wrap:wrap}
.item .link-tag{font-size:9px;color:var(--ac3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;cursor:pointer;text-decoration:underline}
.item .check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--ac3);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.item .check.checked{background:var(--ac);border-color:var(--ac)}
.item .edit-btn{font-size:14px;padding:4px;cursor:pointer;opacity:.4;transition:opacity .2s}
.item .edit-btn:hover{opacity:.8}

/* Status Pills */
.pill{font-size:9px;padding:1px 7px;border-radius:6px;font-weight:500;white-space:nowrap;flex-shrink:0}
.pill-unlisted{background:#EDE8D8;color:#8A8A7A}
.pill-listed{background:#E8D8C0;color:#8A6A3A}
.pill-reserved{background:#D4A855;color:#5A3A1A}
.pill-sold{background:#7A8A6A;color:#F5EFE0}
.pill-todo{background:#E4E2EE;color:#5A5A78}
.pill-progress{background:#B5B0D4;color:#3A3A5A}
.pill-done-fix{background:#8A8AA0;color:#F0EEF5}
.pill-us{background:#DDE8D8;color:#4A6A3A}
.pill-landlord{background:#E8DDD8;color:#6A4A3A}

/* Branch Divider */
.branch{margin:2px 0;display:block;width:100%}

/* FAB */
.fab{position:fixed;bottom:20px;right:max(20px,calc(50% - 230px));width:48px;height:48px;background:var(--ac);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s var(--ease),background .4s var(--ease);z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.fab:hover{transform:scale(1.08) rotate(90deg)}
.fab:active{transform:scale(.95)}
.fab svg{stroke:#E8DFC8;stroke-width:2.5;width:22px;height:22px}

/* Add Section */
.add-sec{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;margin:6px 0;border:1.5px dashed var(--ac3);border-radius:10px;font-size:11px;color:var(--ac2);cursor:pointer;transition:all .15s;background:transparent}
.add-sec:hover{background:var(--input-bg);border-color:var(--ac2)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--bg,#F5EFE0);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:20px 18px 32px;max-height:85dvh;overflow-y:auto;animation:slideUp .3s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:17px;font-weight:600;color:var(--ac4);margin-bottom:14px;text-align:center}
.modal label{display:block;font-size:12px;color:var(--ac2);margin:10px 0 4px;font-weight:500}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1.5px solid var(--card-b);border-radius:10px;font-size:14px;background:var(--card);color:var(--ac4);outline:none;transition:border-color .2s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--ac)}
.modal textarea{resize:vertical;min-height:60px}
.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:500;transition:transform .1s}
.modal .btn:active{transform:scale(.97)}
.modal .btn-primary{background:var(--ac);color:#E8DFC8}
.modal .btn-secondary{background:var(--input-bg);color:var(--ac2)}
.modal .btn-danger{background:#E24B4A;color:#fff}
.modal .img-preview{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--card-b);margin-top:4px}
.modal .img-upload-row{display:flex;gap:8px;align-items:flex-end}
.modal .img-upload-btn{padding:8px 14px;border-radius:8px;background:var(--input-bg);color:var(--ac2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}

/* Sortable ghost/drag styles */
.sortable-ghost{opacity:.4;transform:scale(.96)}
.sortable-chosen{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.sortable-drag{box-shadow:0 8px 24px rgba(0,0,0,.15)}

/* Section drag */
.sec-ghost .sec-head{opacity:.4}

/* Responsive */
@media(min-width:520px){.container{padding:16px 20px}}

/* Animations */
.item,.sec-head{animation:itemIn .3s var(--ease)}
@keyframes itemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';
const e=React.createElement;
const{useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── Firebase Config ── */
/* REPLACE THIS with your Firebase project config */
const firebaseConfig = {
  apiKey: "AIzaSyBMRwUntyyxEf_ipcRv6ixR6W87fVACyfY",
  authDomain: "rose-valley-street-10b.firebaseapp.com",
  databaseURL: "https://rose-valley-street-10b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rose-valley-street-10b",
  storageBucket: "rose-valley-street-10b.firebasestorage.app",
  messagingSenderId: "387411087",
  appId: "1:387411087:web:eaba0d5da7fd70a15114fa"
};

let app,db;
try{app=firebase.app()}catch(_){app=firebase.initializeApp(firebaseConfig)}
db=firebase.database(app);

/* ── Helpers ── */
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtKr(n){return n!=null&&n!==''?Number(n).toLocaleString('sv-SE')+' kr':''}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function domainOf(url){try{return new URL(url).hostname.replace('www.','')}catch(_){return ''}}
function today(){return new Date().toISOString().slice(0,10)}

async function fetchOgImage(url){
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
    const d=await r.json();
    const m=d.contents.match(/<meta[^>]*property=["']og:image["'][^>]*content=["']([^"']+)["']/i);
    if(m)return m[1];
    const m2=d.contents.match(/<meta[^>]*content=["']([^"']+)["'][^>]*property=["']og:image["']/i);
    if(m2)return m2[1];
  }catch(_){}
  return null;
}

async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function compressImage(file,maxW=200){
  return new Promise((res)=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const s=Math.min(maxW/img.width,maxW/img.height,1);
        c.width=img.width*s;c.height=img.height*s;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',.7));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

/* ── SVG Branch Component ── */
function Branch({seed=0}){
  const s=seed*137.5;
  const pts=[];
  let y=14;
  for(let x=0;x<=350;x+=5){
    y=14+Math.sin((x+s)*.02)*5+Math.sin((x+s)*.05)*3;
    pts.push(x+','+y.toFixed(1));
  }
  const path='M'+pts.join(' L');
  const leaves=[];const fruits=[];const emojis=[];
  for(let i=0;i<8;i++){
    const lx=30+i*42+(s%20);
    const ly=14+Math.sin((lx+s)*.03)*4;
    const rot=-20+((i+seed)%5)*10;
    const isLight=(i+seed)%2===0;
    leaves.push(e('ellipse',{key:'l'+i,cx:lx,cy:ly,rx:5.5,ry:2.5,fill:isLight?'#B5C49A':'#7A8A6A',opacity:isLight?.5:.4,transform:'rotate('+rot+' '+lx+' '+ly+')'}));
  }
  for(let i=0;i<3;i++){
    const fx=60+i*110+((s*3)%30);
    fruits.push(e('circle',{key:'f'+i,cx:fx,cy:14+Math.sin((fx+s)*.03)*3,r:2.5,fill:'#3A4A2A',opacity:.35}));
  }
  const e1x=100+((s*2)%150);const e2x=250+((s*3)%80);
  emojis.push(e('text',{key:'em1',x:e1x,y:16,textAnchor:'middle',fontSize:12,opacity:.6},'🍋'));
  emojis.push(e('text',{key:'em2',x:e2x,y:15,textAnchor:'middle',fontSize:11,opacity:.55},'🫒'));

  return e('svg',{className:'branch',viewBox:'0 0 350 28',height:22,preserveAspectRatio:'none'},
    e('path',{d:path,stroke:'#7A8A6A',strokeWidth:1.2,fill:'none',opacity:.45}),
    ...leaves,...fruits,...emojis
  );
}

/* ── Checkmark SVG ── */
function Tick(){return e('svg',{viewBox:'0 0 16 16',width:14,height:14},e('polyline',{points:'3,8 7,12 13,4',fill:'none',stroke:'#FDFAF2',strokeWidth:2,strokeLinecap:'round'}))}

/* ── Modal Component ── */
function Modal({children,onClose,page}){
  return e('div',{className:'modal-overlay','data-page':page,onClick:ev=>{if(ev.target===ev.currentTarget)onClose()}},
    e('div',{className:'modal',onClick:ev=>ev.stopPropagation()},children)
  );
}

/* ── Password Screen ── */
function PasswordScreen({onAuth}){
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const[isSetup,setIsSetup]=useState(null);

  useEffect(()=>{
    db.ref('password').once('value').then(snap=>{
      setIsSetup(!!snap.val());
    }).catch(()=>setIsSetup(false));
  },[]);

  const handleSubmit=async()=>{
    if(!pw.trim())return;
    setLoading(true);setErr('');
    const h=await hashPw(pw.trim());
    if(isSetup){
      const snap=await db.ref('password').once('value');
      if(snap.val()===h){
        sessionStorage.setItem('auth','1');
        onAuth();
      }else{setErr('Fel lösenord. Försök igen.');setLoading(false)}
    }else{
      await db.ref('password').set(h);
      sessionStorage.setItem('auth','1');
      onAuth();
    }
  };

  if(isSetup===null)return e('div',{className:'pw-screen'},e('div',{style:{color:'#7A8A6A'}},'Laddar...'));

  return e('div',{className:'pw-screen'},
    e('span',{className:'pw-decos',style:{top:40,left:30,transform:'rotate(-15deg)'}},'🍋'),
    e('span',{className:'pw-decos',style:{top:60,right:40,transform:'rotate(20deg)'}},'🫒'),
    e('span',{className:'pw-decos',style:{bottom:80,left:50,transform:'rotate(10deg)'}},'🫒'),
    e('span',{className:'pw-decos',style:{bottom:50,right:60,transform:'rotate(-20deg)'}},'🍋'),
    e('div',{className:'pw-box'},
      e('h1',null,'🏡'),
      e('h1',null,'Nya Lägenheten'),
      e('div',{className:'sub'},isSetup?'Ange lösenord för att fortsätta':'Välj ett lösenord för att komma igång'),
      e('input',{type:'password',placeholder:'Lösenord...',value:pw,onChange:ev=>setPw(ev.target.value),onKeyDown:ev=>{if(ev.key==='Enter')handleSubmit()},autoFocus:true}),
      e('button',{onClick:handleSubmit,disabled:loading},loading?'...':isSetup?'Logga in':'Skapa lösenord'),
      err&&e('div',{className:'err'},err)
    )
  );
}

/* ── Main App ── */
function MainApp(){
  const[page,setPage]=useState('buy');
  const[data,setData]=useState({buying:{sections:{}},selling:{items:{}},fixing:{items:{}}});
  const[search,setSearch]=useState('');
  const[modal,setModal]=useState(null);

  useEffect(()=>{
    const ref=db.ref('/');
    ref.on('value',snap=>{
      const v=snap.val()||{};
      setData({
        buying:v.buying||{sections:{}},
        selling:v.selling||{items:{}},
        fixing:v.fixing||{items:{}}
      });
    });
    return()=>ref.off();
  },[]);

  /* ── Buy Page Helpers ── */
  const buyStats=useMemo(()=>{
    const secs=data.buying.sections||{};
    let total=0,purchased=0,budget=0,spent=0;
    Object.values(secs).forEach(s=>{
      Object.values(s.items||{}).forEach(it=>{
        total++;
        if(it.purchased){purchased++;spent+=Number(it.price)||0}
        budget+=Number(it.budget)||0;
      });
    });
    return{total,purchased,budget,spent};
  },[data.buying]);

  const secStats=(sec)=>{
    const items=Object.values(sec.items||{});
    const total=items.length;
    const purchased=items.filter(i=>i.purchased).length;
    const budget=items.reduce((s,i)=>s+(Number(i.budget)||0),0);
    const spent=items.filter(i=>i.purchased).reduce((s,i)=>s+(Number(i.price)||0),0);
    return{total,purchased,budget,spent};
  };

  /* ── Sell Page Helpers ── */
  const sellStats=useMemo(()=>{
    const items=Object.values(data.selling.items||{});
    const total=items.length;
    const sold=items.filter(i=>i.status==='sold').length;
    const expected=items.reduce((s,i)=>s+(Number(i.price)||0),0);
    const received=items.filter(i=>i.status==='sold').reduce((s,i)=>s+(Number(i.price)||0),0);
    return{total,sold,expected,received};
  },[data.selling]);

  /* ── Fix Page Helpers ── */
  const fixStats=useMemo(()=>{
    const items=Object.values(data.fixing.items||{});
    const total=items.length;
    const done=items.filter(i=>i.status==='done').length;
    return{total,done};
  },[data.fixing]);

  /* ── CRUD Operations ── */
  const addSection=(name,emoji)=>{
    const id=genId();
    const secs=data.buying.sections||{};
    const order=Object.keys(secs).length;
    db.ref('buying/sections/'+id).set({name,emoji:emoji||'📦',order,items:{}});
  };

  const updateSection=(secId,updates)=>{db.ref('buying/sections/'+secId).update(updates)};
  const deleteSection=(secId)=>{db.ref('buying/sections/'+secId).remove()};

  const addBuyItem=(secId,item)=>{
    const id=genId();
    const items=data.buying.sections[secId]?.items||{};
    const order=Object.keys(items).length;
    db.ref('buying/sections/'+secId+'/items/'+id).set({...item,order,purchased:false});
    if(item.link){fetchOgImage(item.link).then(img=>{if(img)db.ref('buying/sections/'+secId+'/items/'+id+'/imageUrl').set(img)})}
  };
  const updateBuyItem=(secId,itemId,updates)=>{
    db.ref('buying/sections/'+secId+'/items/'+itemId).update(updates);
    if(updates.link){fetchOgImage(updates.link).then(img=>{if(img)db.ref('buying/sections/'+secId+'/items/'+itemId+'/imageUrl').set(img)})}
  };
  const deleteBuyItem=(secId,itemId)=>{db.ref('buying/sections/'+secId+'/items/'+itemId).remove()};
  const toggleBuyItem=(secId,itemId,val)=>{db.ref('buying/sections/'+secId+'/items/'+itemId+'/purchased').set(val)};

  const addSellItem=(item)=>{
    const id=genId();
    const items=data.selling.items||{};
    const order=Object.keys(items).length;
    db.ref('selling/items/'+id).set({...item,order,status:'unlisted'});
  };
  const updateSellItem=(itemId,updates)=>{db.ref('selling/items/'+itemId).update(updates)};
  const deleteSellItem=(itemId)=>{db.ref('selling/items/'+itemId).remove()};

  const addFixItem=(item)=>{
    const id=genId();
    const items=data.fixing.items||{};
    const order=Object.keys(items).length;
    db.ref('fixing/items/'+id).set({...item,order,status:'todo',dateAdded:today()});
  };
  const updateFixItem=(itemId,updates)=>{db.ref('fixing/items/'+itemId).update(updates)};
  const deleteFixItem=(itemId)=>{db.ref('fixing/items/'+itemId).remove()};

  /* ── Reorder ── */
  const reorderBuyItems=(secId,oldIdx,newIdx)=>{
    const sec=data.buying.sections[secId];
    if(!sec)return;
    const entries=Object.entries(sec.items||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    const[moved]=entries.splice(oldIdx,1);
    entries.splice(newIdx,0,moved);
    const updates={};
    entries.forEach(([id],i)=>{updates['buying/sections/'+secId+'/items/'+id+'/order']=i});
    db.ref().update(updates);
  };

  const reorderSellItems=(oldIdx,newIdx)=>{
    const entries=Object.entries(data.selling.items||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    const[moved]=entries.splice(oldIdx,1);
    entries.splice(newIdx,0,moved);
    const updates={};
    entries.forEach(([id],i)=>{updates['selling/items/'+id+'/order']=i});
    db.ref().update(updates);
  };

  const reorderFixItems=(oldIdx,newIdx)=>{
    const entries=Object.entries(data.fixing.items||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    const[moved]=entries.splice(oldIdx,1);
    entries.splice(newIdx,0,moved);
    const updates={};
    entries.forEach(([id],i)=>{updates['fixing/items/'+id+'/order']=i});
    db.ref().update(updates);
  };

  const reorderSections=(oldIdx,newIdx)=>{
    const entries=Object.entries(data.buying.sections||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    const[moved]=entries.splice(oldIdx,1);
    entries.splice(newIdx,0,moved);
    const updates={};
    entries.forEach(([id],i)=>{updates['buying/sections/'+id+'/order']=i});
    db.ref().update(updates);
  };

  /* ── Filter by search ── */
  const matchSearch=(name)=>!search||name.toLowerCase().includes(search.toLowerCase());

  return e('div',{className:'app','data-page':page},
    e('div',{className:'container'},
      e('div',{className:'hdr'},
        e('h1',null,'Nya Lägenheten 🏡'),
      ),
      e('div',{className:'tabs'},
        e('div',{className:'tab'+(page==='buy'?' active':''),onClick:()=>setPage('buy')},'🫒 Köpa'),
        e('div',{className:'tab'+(page==='sell'?' active':''),onClick:()=>setPage('sell')},'🍋 Sälja'),
        e('div',{className:'tab'+(page==='fix'?' active':''),onClick:()=>setPage('fix')},'🔧 Att fixa'),
      ),

      page==='buy'&&e(BuyPage,{data:data.buying,stats:buyStats,secStats,search,setSearch,matchSearch,addSection,updateSection,deleteSection,addBuyItem,updateBuyItem,deleteBuyItem,toggleBuyItem,reorderBuyItems,reorderSections,setModal,modal}),
      page==='sell'&&e(SellPage,{data:data.selling,stats:sellStats,search,setSearch,matchSearch,addSellItem,updateSellItem,deleteSellItem,reorderSellItems,setModal,modal}),
      page==='fix'&&e(FixPage,{data:data.fixing,stats:fixStats,search,setSearch,matchSearch,addFixItem,updateFixItem,deleteFixItem,reorderFixItems,setModal,modal}),
    ),

    e('div',{className:'fab',onClick:()=>{
      if(page==='buy'){
        const secs=Object.keys(data.buying.sections||{});
        if(secs.length===0){setModal({type:'addSection'})}
        else{setModal({type:'addBuyItem',secId:secs[0]})}
      }else if(page==='sell'){setModal({type:'addSellItem'})}
      else{setModal({type:'addFixItem'})}
    }},e('svg',{viewBox:'0 0 24 24',fill:'none'},e('line',{x1:12,y1:5,x2:12,y2:19}),e('line',{x1:5,y1:12,x2:19,y2:12}))),

    modal&&e(ModalRouter,{modal,setModal,page,data,addSection,updateSection,deleteSection,addBuyItem,updateBuyItem,deleteBuyItem,addSellItem,updateSellItem,deleteSellItem,addFixItem,updateFixItem,deleteFixItem})
  );
}

/* ── Modal Router ── */
function ModalRouter({modal,setModal,page,data,addSection,updateSection,deleteSection,addBuyItem,updateBuyItem,deleteBuyItem,addSellItem,updateSellItem,deleteSellItem,addFixItem,updateFixItem,deleteFixItem}){
  const close=()=>setModal(null);
  const t=modal.type;

  if(t==='addSection')return e(Modal,{onClose:close,page},e(SectionForm,{onSubmit:(n,em)=>{addSection(n,em);close()},onClose:close}));
  if(t==='editSection')return e(Modal,{onClose:close,page},e(SectionForm,{initial:modal,onSubmit:(n,em)=>{updateSection(modal.secId,{name:n,emoji:em});close()},onDelete:()=>{deleteSection(modal.secId);close()},onClose:close}));

  if(t==='addBuyItem'){
    const secs=Object.entries(data.buying.sections||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    return e(Modal,{onClose:close,page},e(BuyItemForm,{sections:secs,defaultSecId:modal.secId,onSubmit:(secId,item)=>{addBuyItem(secId,item);close()},onClose:close}));
  }
  if(t==='editBuyItem')return e(Modal,{onClose:close,page},e(BuyItemForm,{initial:modal.item,onSubmit:(_,updates)=>{updateBuyItem(modal.secId,modal.itemId,updates);close()},onDelete:()=>{deleteBuyItem(modal.secId,modal.itemId);close()},onClose:close,editSecId:modal.secId}));

  if(t==='addSellItem')return e(Modal,{onClose:close,page},e(SellItemForm,{onSubmit:(item)=>{addSellItem(item);close()},onClose:close}));
  if(t==='editSellItem')return e(Modal,{onClose:close,page},e(SellItemForm,{initial:modal.item,onSubmit:(updates)=>{updateSellItem(modal.itemId,updates);close()},onDelete:()=>{deleteSellItem(modal.itemId);close()},onClose:close}));

  if(t==='addFixItem')return e(Modal,{onClose:close,page},e(FixItemForm,{onSubmit:(item)=>{addFixItem(item);close()},onClose:close}));
  if(t==='editFixItem')return e(Modal,{onClose:close,page},e(FixItemForm,{initial:modal.item,onSubmit:(updates)=>{updateFixItem(modal.itemId,updates);close()},onDelete:()=>{deleteFixItem(modal.itemId);close()},onClose:close}));

  return null;
}

        const item={name:name.trim(),budget:Number(budget)||0,price:Number(price)||0,link,imageUrl,emoji};
        onSubmit(secId,item);
      }},initial?'Spara':'Lägg till'),
    )
  );
}

/* ── Sell Item Form ── */
function SellItemForm({initial,onSubmit,onDelete,onClose}){
  const[name,setName]=useState(initial?.name||'');
  const[price,setPrice]=useState(initial?.price||'');
  const[imageUrl,setImageUrl]=useState(initial?.imageUrl||'');
  const[adLink,setAdLink]=useState(initial?.adLink||'');
  const[status,setStatus]=useState(initial?.status||'unlisted');
  const fileRef=useRef();

  const handleFile=async(ev)=>{
    const f=ev.target.files[0];
    if(!f)return;
    const compressed=await compressImage(f);
    setImageUrl(compressed);
  };

  return e(React.Fragment,null,
    e('h2',null,initial?'Redigera sak':'Lägg till sak att sälja'),
    e('label',null,'Namn'),
    e('input',{value:name,onChange:ev=>setName(ev.target.value),placeholder:'t.ex. Skrivbordsstol',autoFocus:true}),
    e('label',null,'Pris (kr)'),
    e('input',{type:'number',value:price,onChange:ev=>setPrice(ev.target.value),placeholder:'0'}),
    e('label',null,'Status'),
    e('select',{value:status,onChange:ev=>setStatus(ev.target.value)},
      e('option',{value:'unlisted'},'Ej listad'),
      e('option',{value:'listed'},'Annonserad'),
      e('option',{value:'reserved'},'Reserverad'),
      e('option',{value:'sold'},'Såld'),
    ),
    e('label',null,'Länk till annons'),
    e('input',{value:adLink,onChange:ev=>setAdLink(ev.target.value),placeholder:'https://blocket.se/...'}),
    e('label',null,'Bild'),
    e('div',{className:'img-upload-row'},
      e('input',{value:typeof imageUrl==='string'&&!imageUrl.startsWith('data:')?imageUrl:'',onChange:ev=>setImageUrl(ev.target.value),placeholder:'Klistra in bild-URL...',style:{flex:1}}),
      e('span',{className:'img-upload-btn',onClick:()=>fileRef.current?.click()},'📷 Ladda upp'),
      e('input',{ref:fileRef,type:'file',accept:'image/*',capture:'environment',style:{display:'none'},onChange:handleFile}),
    ),
    imageUrl&&e('img',{className:'img-preview',src:imageUrl,alt:'',style:{marginTop:6}}),
    e('div',{className:'btn-row'},
      e('button',{className:'btn btn-secondary',onClick:onClose},'Avbryt'),
      onDelete&&e('button',{className:'btn btn-danger',onClick:onDelete},'Radera'),
      e('button',{className:'btn btn-primary',onClick:()=>{
        if(!name.trim())return;
        onSubmit({name:name.trim(),price:Number(price)||0,imageUrl,adLink,status});
      }},initial?'Spara':'Lägg till'),
    )
  );
}

/* ── Fix Item Form ── */
function FixItemForm({initial,onSubmit,onDelete,onClose}){
  const[name,setName]=useState(initial?.name||'');
  const[responsibility,setResp]=useState(initial?.responsibility||'us');
  const[status,setStatus]=useState(initial?.status||'todo');
  const[imageUrl,setImageUrl]=useState(initial?.imageUrl||'');
  const fileRef=useRef();

  const handleFile=async(ev)=>{
    const f=ev.target.files[0];
    if(!f)return;
    const compressed=await compressImage(f);
    setImageUrl(compressed);
  };

  return e(React.Fragment,null,
    e('h2',null,initial?'Redigera uppgift':'Ny uppgift'),
    e('label',null,'Beskrivning'),
    e('input',{value:name,onChange:ev=>setName(ev.target.value),placeholder:'t.ex. Byta lampa i hallen',autoFocus:true}),
    e('label',null,'Ansvarig'),
    e('select',{value:responsibility,onChange:ev=>setResp(ev.target.value)},
      e('option',{value:'us'},'Vi'),
      e('option',{value:'landlord'},'Hyresvärd'),
    ),
    e('label',null,'Status'),
    e('select',{value:status,onChange:ev=>setStatus(ev.target.value)},
      e('option',{value:'todo'},'Att göra'),
      e('option',{value:'progress'},'Pågår'),
      e('option',{value:'done'},'Klart'),
    ),
    e('label',null,'Foto'),
    e('div',{className:'img-upload-row'},
      e('input',{value:typeof imageUrl==='string'&&!imageUrl.startsWith('data:')?imageUrl:'',onChange:ev=>setImageUrl(ev.target.value),placeholder:'Klistra in bild-URL...',style:{flex:1}}),
      e('span',{className:'img-upload-btn',onClick:()=>fileRef.current?.click()},'📷 Ladda upp'),
      e('input',{ref:fileRef,type:'file',accept:'image/*',capture:'environment',style:{display:'none'},onChange:handleFile}),
    ),
    imageUrl&&e('img',{className:'img-preview',src:imageUrl,alt:'',style:{marginTop:6}}),
    e('div',{className:'btn-row'},
      e('button',{className:'btn btn-secondary',onClick:onClose},'Avbryt'),
      onDelete&&e('button',{className:'btn btn-danger',onClick:onDelete},'Radera'),
      e('button',{className:'btn btn-primary',onClick:()=>{
        if(!name.trim())return;
        const updates={name:name.trim(),responsibility,status,imageUrl};
        if(status==='done'&&initial?.status!=='done')updates.dateCompleted=today();
        onSubmit(updates);
      }},initial?'Spara':'Lägg till'),
    )
  );
}

/* ── Root ── */
function App(){
  const[authed,setAuthed]=useState(sessionStorage.getItem('auth')==='1');
  if(!authed)return e(PasswordScreen,{onAuth:()=>setAuthed(true)});
  return e(MainApp);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));

})();
</script>
