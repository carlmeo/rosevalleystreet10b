function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

async function fetchOgData(url){try{const r=await fetch('https://api.microlink.io?url='+encodeURIComponent(url));const d=await r.json();if(d.status==='success'&&d.data){return{image:d.data.image?.url||d.data.logo?.url||'',title:d.data.title||''}}return{image:'',title:''}}catch(_){return{image:'',title:''}}}
async function hashPw(pw){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function compressImage(file,maxW=200){return new Promise(res=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const s=Math.min(maxW/img.width,maxW/img.height,1);c.width=img.width*s;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',.7))};img.src=ev.target.result};r.readAsDataURL(file)})}

function Branch({seed=0}){
  const s=seed*137.5,pts=[];
  for(let x=0;x<=350;x+=5){pts.push(x+','+(18+Math.sin((x+s)*.02)*7+Math.sin((x+s)*.05)*4).toFixed(1))}
  const leaves=[],fruits=[],emojis=[];
  for(let i=0;i<10;i++){const lx=20+i*34+(s%15),ly=18+Math.sin((lx+s)*.03)*5,rot=-25+((i+seed)%5)*12;
    leaves.push(e('ellipse',{key:'l'+i,cx:lx,cy:ly,rx:7,ry:3,fill:(i+seed)%2===0?'#8AB83A':'#5A8A3A',opacity:(i+seed)%2===0?.65:.55,transform:'rotate('+rot+' '+lx+' '+ly+')'}))}
  for(let i=0;i<4;i++){const fx=45+i*85+((s*3)%25);fruits.push(e('circle',{key:'f'+i,cx:fx,cy:18+Math.sin((fx+s)*.03)*4,r:3.5,fill:'#3A5A2A',opacity:.5}))}
  emojis.push(e('text',{key:'e1',x:70+((s*2)%120),y:24,textAnchor:'middle',fontSize:15,opacity:.8},'🍋'));
  emojis.push(e('text',{key:'e2',x:200+((s*3)%60),y:22,textAnchor:'middle',fontSize:13,opacity:.75},'🫒'));
  emojis.push(e('text',{key:'e3',x:310+((s)%30),y:23,textAnchor:'middle',fontSize:seed%2===0?14:12,opacity:.7},seed%2===0?'🍋':'🫒'));
  return e('svg',{className:'branch',viewBox:'0 0 350 38',height:38,preserveAspectRatio:'none'},

function PwScreen({onAuth}){
  const[pw,setPw]=useState('');const[err,setErr]=useState('');const[ld,setLd]=useState(false);const[setup,setSetup]=useState(null);

  const go=async()=>{if(!pw.trim())return;setLd(true);setErr('');const h=await hashPw(pw.trim());
    if(setup){const s=await db.ref('password').once('value');if(s.val()===h){sessionStorage.setItem('auth','1');onAuth()}else{setErr('Fel lösenord.');setLd(false)}}

function Main(){

  const buyStats=useMemo(()=>{let t=0,p=0,b=0,s=0;Object.values(data.buying.sections||{}).forEach(sec=>Object.values(sec.items||{}).forEach(i=>{t++;if(i.purchased){p++;s+=Number(i.price)||0}b+=Number(i.budget)||0}));return{total:t,purchased:p,budget:b,spent:s}},[data.buying]);
